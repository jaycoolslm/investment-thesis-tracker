services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: thesis
      POSTGRES_PASSWORD: thesis
      POSTGRES_DB: thesis_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thesis -d thesis_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: runner
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://thesis:thesis@postgres:5432/thesis_tracker
      PORT: "3001"
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      DATA_PROVIDER_URL: ${DATA_PROVIDER_URL:-}
    extra_hosts:
      # Lets host.docker.internal resolve to the host on Linux Docker Engine,
      # so the containerised API can reach a provider running on the host.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/documents:/data/documents

volumes:
  postgres_data:
