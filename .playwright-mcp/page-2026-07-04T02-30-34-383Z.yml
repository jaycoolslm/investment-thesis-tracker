              - heading "Summary" [level=2] [ref=f1e48]
              - paragraph [ref=f1e49]: Apple demonstrates strong competitive positioning driven by its services ecosystem and installed base of over 2 billion active devices. The company's transition toward higher-margin services revenue provides a durable earnings growth trajectory, while disciplined capital allocation through buybacks enhances per-share economics.
              - heading "Thesis Pillars" [level=2] [ref=f1e50]
              - heading "Services Revenue Flywheel" [level=3] [ref=f1e51]
              - paragraph [ref=f1e52]: Apple's services segment grew 14% YoY to $24.2B in Q1 FY25, now representing 27% of total revenue. The installed base of 2.2B active devices creates a recurring revenue stream with 70%+ gross margins, significantly above the 36% hardware margin.
              - heading "Pricing Power and Brand Moat" [level=3] [ref=f1e53]
              - paragraph [ref=f1e54]: Apple raised iPhone ASPs by 8% over the past two years with minimal volume impact. The ecosystem lock-in (iCloud, Apple Watch, AirPods) drives a switching cost moat that sustains premium pricing across product lines.
              - heading "Capital Return Program" [level=3] [ref=f1e55]
              - paragraph [ref=f1e56]: Apple has returned $700B+ to shareholders since 2012 through buybacks and dividends. The company repurchased $25B in Q1 FY25 alone, reducing share count by ~3% annually and driving EPS growth above revenue growth.
              - heading "Quality Assessment" [level=2] [ref=f1e57]
              - paragraph [ref=f1e58]: "Financial Strength: ROIC of 58%, net cash position of $51B, FCF margin of 28%. Competitive Position: Dominant in premium smartphones (85% of industry profits), growing services moat. ESG: Carbon neutral since 2020 for corporate operations, supply chain target 2030."
              - heading "Valuation" [level=2] [ref=f1e59]
              - paragraph [ref=f1e60]: DCF with terminal growth rate of 3%, WACC of 9.5%.
